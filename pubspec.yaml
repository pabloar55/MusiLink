name: musi_link
description: "MusiLink - Connect through music."
publish_to: 'none'
version: 1.0.9+14

environment:
  sdk: ^3.11.5

dependencies:
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  firebase_crashlytics: ^5.2.4
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  http: ^1.6.0  # Para llamadas a la API
  flutter_secure_storage: ^10.3.1 # Para guardar el token de forma segura
  cloud_functions: ^6.3.3
  font_awesome_flutter: ^11.0.0 # Para iconos
  cupertino_icons: ^1.0.9
  lucide_icons_flutter: ^3.1.15
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.2
  flutter_native_splash: ^2.4.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  image_picker: ^1.2.3
  firebase_storage: ^13.4.3
  firebase_remote_config: ^6.5.5
  package_info_plus: ^10.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/images/IconoApp1024.png"
    background_color: "#000000"
    theme_color: "#000000"
  image_path: "assets/images/IconoApp1024.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/iconoApp.png"
  adaptive_icon_foreground_inset: 22
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
